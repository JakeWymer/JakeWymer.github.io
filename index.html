<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Color Is Your Soul?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --text: #e8e4d9;
    --dim: #8a8070;
    --accent: #c9a96e;
    --orb: rgba(201,169,110,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    cursor: default;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    transition: all 2s ease;
    z-index: 0;
  }
  .orb1 { width: 600px; height: 600px; top: -200px; left: -200px; background: var(--orb); }
  .orb2 { width: 400px; height: 400px; bottom: -100px; right: -100px; background: rgba(100,80,160,0.12); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 700px;
    padding: 40px 30px;
  }

  /* INTRO SCREEN */
  #intro {
    text-align: center;
    animation: fadeIn 1.2s ease;
  }

  .eye-icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 32px;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    line-height: 1.15;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e8e4d9 30%, #c9a96e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 1.2rem;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 48px;
    line-height: 1.7;
  }

  .btn-start {
    display: inline-block;
    padding: 16px 48px;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .btn-start:hover::before { transform: translateX(0); }
  .btn-start:hover { color: var(--bg); }

  /* QUIZ SCREEN */
  #quiz { display: none; animation: fadeIn 0.8s ease; }

  .progress-bar {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin-bottom: 48px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .q-counter {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .question-text {
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 300;
    line-height: 1.5;
    margin-bottom: 40px;
    font-style: italic;
  }

  .options {
    display: grid;
    gap: 12px;
  }

  .option {
    padding: 18px 24px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--dim);
    background: rgba(255,255,255,0.02);
    transition: all 0.3s ease;
    text-align: left;
    position: relative;
    overflow: hidden;
    line-height: 1.4;
  }

  .option::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: bottom;
  }

  .option:hover {
    border-color: rgba(201,169,110,0.4);
    color: var(--text);
    background: rgba(201,169,110,0.05);
  }
  .option:hover::before { transform: scaleY(1); }

  .option.selected {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(201,169,110,0.08);
  }
  .option.selected::before { transform: scaleY(1); }

  /* RESULT SCREEN */
  #result { display: none; text-align: center; }

  .result-orb {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 0 auto 40px;
    position: relative;
    animation: pulse 3s ease-in-out infinite;
  }

  .result-orb::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    animation: pulse 3s ease-in-out infinite reverse;
    opacity: 0.3;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.85; }
  }

  .soul-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .soul-color-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 600;
    margin-bottom: 24px;
    line-height: 1;
  }

  .soul-tagline {
    font-size: 1.25rem;
    font-style: italic;
    color: var(--dim);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .soul-desc {
    font-size: 1.1rem;
    line-height: 1.9;
    color: rgba(232,228,217,0.75);
    max-width: 520px;
    margin: 0 auto 48px;
  }

  .soul-traits {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 48px;
  }

  .trait {
    padding: 6px 18px;
    border: 1px solid;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .btn-retry {
    display: inline-block;
    padding: 14px 40px;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--dim);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    transition: all 0.3s ease;
  }
  .btn-retry:hover { border-color: var(--text); color: var(--text); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-wrap { animation: fadeIn 0.5s ease; }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 32px auto;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="bg-orb orb1" id="bgOrb1"></div>
<div class="bg-orb orb2" id="bgOrb2"></div>

<div class="container">

  <!-- INTRO -->
  <div id="intro">
    <svg class="eye-icon" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="30" rx="28" ry="18" stroke="#c9a96e" stroke-width="1"/>
      <circle cx="30" cy="30" r="9" stroke="#c9a96e" stroke-width="1"/>
      <circle cx="30" cy="30" r="3" fill="#c9a96e" opacity="0.5"/>
    </svg>
    <h1>What Color<br>Is Your Soul?</h1>
    <p class="subtitle">Seven questions stand between you<br>and the hue that lives within.</p>
    <button class="btn-start" onclick="startQuiz()">Begin the Revelation</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="questionWrap"></div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="result-orb" id="resultOrb"></div>
    <div class="soul-label">Your Soul Is</div>
    <div class="soul-color-name" id="resultName"></div>
    <div class="divider"></div>
    <div class="soul-tagline" id="resultTagline"></div>
    <div class="soul-desc" id="resultDesc"></div>
    <div class="soul-traits" id="resultTraits"></div>
    <button class="btn-retry" onclick="restartQuiz()">Reveal Again</button>
  </div>

</div>

<script>
const questions = [
  {
    text: "You wake before your alarm. The world is still dark. You…",
    options: [
      { text: "Lie still and let your mind drift through half-formed dreams", scores: { indigo: 3, silver: 1 } },
      { text: "Rise immediately — the quiet belongs to the ones who claim it", scores: { gold: 3, crimson: 1 } },
      { text: "Reach for someone warm beside you", scores: { rose: 3, amber: 1 } },
      { text: "Open a window and listen to the silence", scores: { jade: 3, silver: 1 } },
    ]
  },
  {
    text: "A stranger gives you a single seed. They say it will grow into something extraordinary. What do you do?",
    options: [
      { text: "Plant it in secret — the growing is yours alone to witness", scores: { indigo: 2, jade: 2 } },
      { text: "Research exactly what it needs before it touches soil", scores: { silver: 3, gold: 1 } },
      { text: "Give it to someone who needs it more than you", scores: { rose: 3, amber: 1 } },
      { text: "Plant it somewhere wild and trust it to find its way", scores: { crimson: 2, jade: 2 } },
    ]
  },
  {
    text: "When you are most yourself, you are…",
    options: [
      { text: "Alone somewhere vast — a rooftop, a hillside, the edge of things", scores: { indigo: 3, crimson: 1 } },
      { text: "In motion — hands busy, mind sharp, a problem dissolving", scores: { gold: 2, silver: 2 } },
      { text: "Laughing with people who've known you too long to pretend", scores: { amber: 3, rose: 1 } },
      { text: "Lost inside something — a book, a memory, a piece of music", scores: { indigo: 2, rose: 2 } },
    ]
  },
  {
    text: "There's a door at the end of a long corridor. You don't know what's behind it. You feel…",
    options: [
      { text: "A pull — not quite fear, not quite hope. Something older.", scores: { indigo: 3, crimson: 1 } },
      { text: "Impatient. You open it.", scores: { crimson: 3, gold: 1 } },
      { text: "Curious, but you wait. Some things reveal themselves to those who are still.", scores: { jade: 3, silver: 1 } },
      { text: "You look for a window first. You like to know the shape of things.", scores: { silver: 3, amber: 1 } },
    ]
  },
  {
    text: "Your most honest emotion is usually…",
    options: [
      { text: "Longing — for something just out of reach, not always named", scores: { rose: 2, indigo: 2 } },
      { text: "Conviction — the kind that moves you before your mind catches up", scores: { crimson: 3, gold: 1 } },
      { text: "Warmth — a quiet satisfaction in the ordinary made lovely", scores: { amber: 3, jade: 1 } },
      { text: "Wonder — the hinge-moment when something ordinary cracks open", scores: { silver: 2, jade: 2 } },
    ]
  },
  {
    text: "What do you leave behind in a room when you exit?",
    options: [
      { text: "An atmosphere — something shifted, though no one can say how", scores: { indigo: 3, rose: 1 } },
      { text: "An impression — people remember what you said, or how you moved", scores: { crimson: 2, gold: 2 } },
      { text: "Warmth — people feel easier somehow after you've been", scores: { amber: 3, rose: 1 } },
      { text: "Order, or beauty, or both", scores: { silver: 2, jade: 2 } },
    ]
  },
  {
    text: "If your life had a texture, it would be…",
    options: [
      { text: "Dark velvet — depth that absorbs the light", scores: { indigo: 3, crimson: 1 } },
      { text: "Rough-cut stone — something real, something that endures", scores: { jade: 2, gold: 2 } },
      { text: "Warm linen — lived in, soft, kept close", scores: { amber: 3, rose: 1 } },
      { text: "Still water — surface calm, everything beneath it moving", scores: { silver: 3, indigo: 1 } },
    ]
  }
];

const souls = {
  indigo: {
    name: "Indigo",
    tagline: "You are the space between stars — depth without end.",
    desc: "Your soul carries an ancient quiet. You feel the world in layers others can't quite reach, and you've learned to live in the in-between — between knowing and not-knowing, between belonging and solitude. You are drawn to mystery not because you fear answers, but because you understand that some questions are the destination.",
    traits: ["Intuitive", "Boundless", "Otherworldly", "Still"],
    color: "#3B2F8F",
    glow: "rgba(59, 47, 143, 0.6)",
    textColor: "#a898f8"
  },
  crimson: {
    name: "Crimson",
    tagline: "You are the fire that decides its own direction.",
    desc: "Your soul burns with intention. You don't wait for permission — you move, you act, you feel everything at full volume. Where others hesitate at the edge, you have already jumped. Life for you is not a thing to be observed; it is something you enter completely, with your whole self and without apology.",
    traits: ["Fierce", "Sovereign", "Magnetic", "Alive"],
    color: "#8B1A2A",
    glow: "rgba(139, 26, 42, 0.6)",
    textColor: "#f07080"
  },
  gold: {
    name: "Gold",
    tagline: "You are the light that makes sense of things.",
    desc: "Your soul is a clarifying force. You have an uncommon gift: you can look at something tangled and find the thread. You bring structure not because you need control, but because you understand that beauty and order are the same thing. People trust you before they know why. The warmth you carry is real.",
    traits: ["Discerning", "Luminous", "Purposeful", "True"],
    color: "#8B6914",
    glow: "rgba(201, 169, 110, 0.6)",
    textColor: "#f0c060"
  },
  jade: {
    name: "Jade",
    tagline: "You are the long patience of growing things.",
    desc: "Your soul has roots. You are not in a hurry, and this is not weakness — it is a kind of power that the restless world doesn't understand. You know how to be still. You know how to wait for the right moment with the confidence of someone who has always trusted that it comes. You restore what is worn.",
    traits: ["Rooted", "Perennial", "Wise", "Restorative"],
    color: "#1A5E3F",
    glow: "rgba(26, 94, 63, 0.6)",
    textColor: "#6ecfa0"
  },
  rose: {
    name: "Rose",
    tagline: "You are tenderness given a spine.",
    desc: "Your soul is not soft in the way people dismiss — it is soft in the way water is soft, and water shapes stone. You feel deeply and you let yourself. You've learned that caring is an act of courage, not vulnerability. The love you carry is not naive; it has survived things. And it chose, after all of that, to remain.",
    traits: ["Tender", "Courageous", "Devoted", "Radiant"],
    color: "#7A2A3F",
    glow: "rgba(180, 80, 100, 0.6)",
    textColor: "#f09aaa"
  },
  amber: {
    name: "Amber",
    tagline: "You are warmth that asks nothing in return.",
    desc: "Your soul is home to others. There is something in you that makes the ordinary sacred — a meal, a conversation, the late afternoon light through a window. You know how to be present in a way that feels rare now. People come back to you, again and again, and not always knowing why. You are the reason the room felt right.",
    traits: ["Present", "Generous", "Grounding", "Golden"],
    color: "#7A4010",
    glow: "rgba(200, 120, 40, 0.6)",
    textColor: "#f0a060"
  },
  silver: {
    name: "Silver",
    tagline: "You are clarity at the edge of the known.",
    desc: "Your soul is a precise and luminous thing. You see patterns in what others call noise, and you've always trusted the evidence of careful thought. But beneath the clarity lives a genuine wonder — you are not cold, you are specific. You love what is true, and you know that truth, when you find it, is always stranger and more beautiful than anyone expected.",
    traits: ["Perceptive", "Precise", "Wondering", "Honest"],
    color: "#3A4A5A",
    glow: "rgba(140, 160, 190, 0.6)",
    textColor: "#b8d0e8"
  }
};

let scores = {};
let currentQ = 0;

function startQuiz() {
  scores = { indigo: 0, crimson: 0, gold: 0, jade: 0, rose: 0, amber: 0, silver: 0 };
  currentQ = 0;
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  const wrap = document.getElementById('questionWrap');
  wrap.innerHTML = `
    <div class="question-wrap">
      <div class="q-counter">Question ${currentQ + 1} of ${questions.length}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option" onclick="selectOption(${i})">${o.text}</button>
        `).join('')}
      </div>
    </div>
  `;
}

function selectOption(i) {
  const q = questions[currentQ];
  const chosen = q.options[i];

  // highlight
  document.querySelectorAll('.option').forEach((el, idx) => {
    if (idx === i) el.classList.add('selected');
  });

  // add scores
  for (const [color, pts] of Object.entries(chosen.scores)) {
    scores[color] = (scores[color] || 0) + pts;
  }

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 400);
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';

  // find winner
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const soul = souls[winner];

  document.getElementById('quiz').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.style.animation = 'fadeIn 1s ease';

  // orb
  const orb = document.getElementById('resultOrb');
  orb.style.background = `radial-gradient(circle at 35% 35%, ${soul.glow}, ${soul.color})`;
  orb.style.boxShadow = `0 0 60px ${soul.glow}, 0 0 120px ${soul.glow.replace('0.6','0.2')}`;
  orb.style.setProperty('--glow', soul.glow);

  document.getElementById('resultName').textContent = soul.name;
  document.getElementById('resultName').style.color = soul.textColor;
  document.getElementById('resultTagline').textContent = soul.tagline;
  document.getElementById('resultDesc').textContent = soul.desc;

  const traitsEl = document.getElementById('resultTraits');
  traitsEl.innerHTML = soul.traits.map(t => `
    <span class="trait" style="border-color:${soul.textColor};color:${soul.textColor}">${t}</span>
  `).join('');

  // change bg orbs
  document.getElementById('bgOrb1').style.background = soul.glow;
}

function restartQuiz() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('bgOrb1').style.background = 'var(--orb)';
  document.getElementById('intro').style.display = 'block';
  document.getElementById('intro').style.animation = 'fadeIn 0.8s ease';
}
</script>
</body>
</html>
